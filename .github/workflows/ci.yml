name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Test with coverage
        if: matrix.node-version == 22
        run: npm run test:coverage

      - name: Smoke test CLI
        run: node packages/cli/dist/index.js scan ./examples --json

      - name: Smoke test fix (dry-run)
        run: node packages/cli/dist/index.js fix ./examples --dry-run

      - name: Smoke test diff
        run: node packages/cli/dist/index.js diff HEAD --json

      - name: Smoke test baseline
        run: |
          node packages/cli/dist/index.js baseline create
          node packages/cli/dist/index.js baseline status

      - name: Smoke test SARIF report
        run: |
          node packages/cli/dist/index.js scan ./examples --report sarif
          test -f guardrail.sarif

      - name: Smoke test Markdown report
        run: |
          node packages/cli/dist/index.js scan ./examples --report md
          test -f GUARDRAIL-AUDIT.md
